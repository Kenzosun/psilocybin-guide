<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>純度檢測試劑 - 完整操作教學指南</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050510 100%);
            overflow-x: hidden;
            min-height: 100vh;
            color: white;
        }

        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.015), rgba(0, 0, 255, 0.04));
            z-index: 50;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .scanline {
            width: 100%;
            height: 100px;
            background: linear-gradient(0deg, transparent, rgba(32, 255, 238, 0.15), transparent);
            position: fixed;
            z-index: 49;
            animation: scanline 6s linear infinite;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
            min-height: 100vh;
        }

        @media (min-width: 640px) {
            .container {
                padding: 24px 32px;
            }
        }

        .max-w-5xl {
            max-width: 64rem;
            width: 100%;
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.4;
            pointer-events: none;
            z-index: 1;
            transition: all 1s ease;
        }

        nav {
            z-index: 10;
            width: 100%;
            margin-bottom: 24px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .kit-tab {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 2px solid;
            transition: all 0.3s ease;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .kit-tab:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .kit-tab.active {
            color: white;
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-4px);
        }

        header {
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 16px;
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) {
            header {
                flex-direction: row;
            }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .zap-icon {
            width: 40px;
            height: 40px;
            stroke-width: 3;
            stroke: currentColor;
            fill: none;
        }

        .header-title {
            font-size: 18px;
            overflow: hidden;
        }

        @media (min-width: 480px) {
            .header-title {
                font-size: 22px;
            }
        }

        @media (min-width: 768px) {
            .header-title {
                font-size: 32px;
            }
        }

        .header-title h1 {
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: clamp(16px, 5vw, 32px);
        }

        .header-title .glitch-text:hover {
            animation: glitch 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
            text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff;
        }

        .header-subtitle {
            font-size: 12px;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.6);
            font-weight: bold;
            text-transform: uppercase;
            margin: 0;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 16px;
        }

        @media (min-width: 768px) {
            .header-right {
                margin-top: 0;
            }
        }

        .status-label {
            color: rgba(255, 255, 255, 0.4);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
        }

        .status-online {
            animation: pulse-glow 1.5s ease-in-out infinite;
            font-weight: 900;
            font-size: 14px;
        }

        .step-counter {
            letter-spacing: 0.2em;
            color: white;
            font-weight: 900;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 4px;
            margin-left: 16px;
            font-size: 14px;
        }

        main {
            z-index: 10;
            width: 100%;
            max-width: 64rem;
            position: relative;
            margin-bottom: 40px;
            transition: all 0.3s ease;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 24px;
            border-radius: 9999px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .progress-fill {
            height: 100%;
            transition: width 0.7s ease;
        }

        .step-nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .step-dot {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 900;
            border: 2px solid;
            transition: all 0.3s ease;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }

        .step-dot:hover {
            border-color: rgba(255, 255, 255, 0.3);
        }

        .step-dot.active {
            color: black;
            border-color: white;
        }

        .cyber-border {
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(5, 5, 20, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) {
            .cyber-border {
                padding: 32px;
            }
        }

        .cyber-border::before,
        .cyber-border::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid;
            pointer-events: none;
        }

        .cyber-border::before {
            top: -3px;
            left: -3px;
        }

        .cyber-border::after {
            bottom: -3px;
            right: -3px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }

        @media (min-width: 1024px) {
            .content-grid.has-image {
                grid-template-columns: 1fr 2fr;
            }

            .content-grid.has-image .image-section {
                grid-column: 1;
            }

            .content-grid.has-image .text-section {
                grid-column: 2;
            }
        }

        .image-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .image-container {
            position: relative;
        }

        .image-blur {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 9999px;
            filter: blur(48px);
            opacity: 0.2;
        }

        .image-display {
            position: relative;
            z-index: 10;
            width: 100%;
            aspect-ratio: 1;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: black;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.5);
            max-width: 320px;
            margin: 0 auto;
        }

        .image-overlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            pointer-events: none;
            mix-blend-mode: color;
            opacity: 0.5;
        }

        .image-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.25);
        }

        .image-tabs {
            position: absolute;
            bottom: 12px;
            left: 12px;
            z-index: 40;
            display: flex;
            gap: 8px;
        }

        .image-tab-btn {
            padding: 4px 8px;
            font-weight: 900;
            font-size: 12px;
            border: 2px solid;
            transition: all 0.3s ease;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border-color: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .image-tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .image-tab-btn.active {
            background: white;
            color: black;
            border-color: white;
        }

        .text-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .icon-box {
            padding: 8px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-box svg {
            width: 28px;
            height: 28px;
            stroke-width: 2.5;
            stroke: currentColor;
            fill: none;
        }

        .section-label {
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        h2 {
            font-size: 32px;
            font-weight: 900;
            color: white;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
            text-shadow: 0 4px 4px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 768px) {
            h2 {
                font-size: 40px;
            }
        }

        .description {
            color: white;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 24px;
            font-weight: 900;
            background: rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid;
        }

        @media (min-width: 768px) {
            .description {
                font-size: 20px;
            }
        }

        .tasks-box {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            box-shadow: inset 0 4px 4px rgba(0, 0, 0, 0.3);
        }

        .tasks-header {
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 12px;
        }

        .tasks-dot {
            width: 8px;
            height: 8px;
            border-radius: 9999px;
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .task-icon {
            width: 24px;
            height: 24px;
            margin-top: 4px;
            flex-shrink: 0;
            stroke-width: 3;
            stroke: currentColor;
            fill: none;
        }

        .task-text {
            font-size: 18px;
            color: white;
            font-weight: bold;
            letter-spacing: 0.025em;
            line-height: 1.4;
        }

        .tip-box {
            margin-top: 24px;
            padding: 16px;
            border: 2px solid #facc15;
            background: rgba(250, 204, 21, 0.1);
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.1);
        }

        .tip-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #facc15;
        }

        .tip-icon {
            width: 16px;
            height: 16px;
            stroke-width: 3;
            stroke: currentColor;
            fill: none;
        }

        .tip-text {
            color: rgba(254, 243, 199, 1);
            font-size: 16px;
            font-weight: bold;
            line-height: 1.5;
        }

        @media (min-width: 768px) {
            .tip-text {
                font-size: 18px;
            }
        }

        .nav-buttons-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
            gap: 16px;
        }

        button {
            font-family: inherit;
            border: none;
            cursor: pointer;
        }

        .prev-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            font-weight: 900;
            border: 2px solid;
            border-radius: 12px;
            font-size: 16px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            color: white;
            border-color: rgba(255, 255, 255, 0.4);
        }

        .prev-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
        }

        .prev-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .chevron-icon {
            width: 24px;
            height: 24px;
            stroke-width: 2;
            stroke: currentColor;
            fill: none;
        }

        .next-btn {
            padding: 12px 40px;
            font-weight: 900;
            border-radius: 12px;
            font-size: 16px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.5s ease;
            color: black;
        }

        .next-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .info-cards {
            z-index: 10;
            width: 100%;
            max-width: 64rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            margin-bottom: 48px;
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) {
            .info-cards {
                grid-template-columns: 1fr 1fr;
            }
        }

        .info-card {
            border-radius: 16px;
            padding: 24px;
        }

        .info-card.storage {
            background: rgba(59, 130, 246, 0.1);
            border: 2px solid rgba(59, 130, 246, 0.4);
        }

        .info-card.warnings {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid rgba(239, 68, 68, 0.4);
        }

        .info-card h4 {
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            font-size: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .info-card-icon {
            width: 20px;
            height: 20px;
            min-width: 20px;
            stroke-width: 2.5;
            stroke: currentColor;
            fill: none;
        }

        .info-card.storage h4 .info-card-icon {
            color: #60a5fa;
        }

        .info-card.warnings h4 .info-card-icon {
            color: #ef4444;
        }

        .info-card p {
            color: white;
            font-size: 16px;
            font-weight: bold;
            line-height: 1.6;
        }

        .warnings-list {
            color: white;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
        }

        .warning-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .warning-icon {
            width: 16px;
            height: 16px;
            color: #fca5a5;
            flex-shrink: 0;
            margin-top: 2px;
            stroke-width: 3;
            stroke: currentColor;
            fill: none;
        }

        footer {
            z-index: 10;
            width: 100%;
            max-width: 64rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
            padding-top: 24px;
            padding-bottom: 32px;
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            gap: 8px;
        }

        @media (min-width: 640px) {
            footer {
                flex-direction: row;
                gap: 0;
            }
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.96);
        }

        .fade-in {
            opacity: 1;
            transform: scale(1);
            transition: all 0.4s ease;
        }

        svg {
            display: block;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(5, 5, 20, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="scanline"></div>
    <div class="container">
        <div class="bg-overlay" id="bgOverlay"></div>
        <nav>
            <div class="nav-buttons" id="navButtons"></div>
        </nav>
        <header id="header"></header>
        <main id="main"></main>
        <section class="info-cards" id="infoCards"></section>
        <footer id="footer"></footer>
    </div>

    <script>
        // Kit data
        const KITS = {
            psilocybin: {
                id: "psilocybin",
                name: "Psilocybin 裸蓋菇鹼",
                subtitle: "蘑菇純度檢測",
                terminalName: "Psilocybin_Test",
                protocolVersion: "v2.8",
                themeColor: "#a855f7",
                twColor: "text-purple-400",
                tabBg: "from-purple-600 to-purple-900",
                steps: [
                    {
                        id: "PSI_01", title: "安全須知 — 請先閱讀！", icon: "ShieldAlert",
                        neonColor: "#ff003c", twColor: "text-red-500",
                        bgGlow: "shadow-[0_0_40px_rgba(255,0,60,0.2)]",
                        bgImage: "radial-gradient(circle at 20% 20%, rgba(255, 0, 60, 0.15) 0%, transparent 50%)",
                        desc: "玻璃瓶中含有改良版 Hofmann 試劑（含硫酸），可能嚴重灼傷皮膚和眼睛。操作前務必做好防護。",
                        tasks: [
                            "戴上丁腈手套並取下隱形眼鏡，建議佩戴護目鏡",
                            "若液體接觸皮膚，立即用水沖洗數分鐘",
                            "若液體濺入眼睛，撐開上下眼瞼用水沖洗數分鐘",
                            "將試劑盒存放在兒童和寵物（尤其是貓）接觸不到的地方",
                            "測試結束後，依照廢棄處理步驟處理液體，切勿直接丟棄"
                        ],
                        tip: null,
                        images: [{ src: "https://puritytestkits.com/wp-content/uploads/2025/02/gloves-goggles-150x150.png", alt: "安全裝備" }]
                    },
                    {
                        id: "PSI_02", title: "重要注意事項", icon: "Eye",
                        neonColor: "#ffea00", twColor: "text-yellow-400",
                        bgGlow: "shadow-[0_0_40px_rgba(255,234,0,0.2)]",
                        bgImage: "radial-gradient(circle at 80% 80%, rgba(255, 234, 0, 0.15) 0%, transparent 50%)",
                        desc: "開始操作前，請務必了解以下關鍵資訊，以確保測試結果的準確性。",
                        tasks: [
                            "迷幻蘑菇種類繁多，使用前請先確認品種。本試劑無法區分有毒與無毒蘑菇",
                            "本試劑同時檢測裸蓋菇鹼 (psilocybin) 和裸蓋菇素 (psilocin)，最終顏色反映兩者的綜合含量",
                            "測試前請先將整批乾燥蘑菇研磨均勻（使用研磨機或刀切碎），取少量均質材料測試即代表整批結果",
                            "在室溫下使用。若存放冰箱，取出後需靜置一小時回溫",

                                <div class="image-overlay" style="background-color: ${currentData.neonColor}"></div>
                                <img src="${currentImage.src}" alt="${currentImage.alt}" />
                                ${currentData.images.length > 1 ? `
                                    <div class="image-tabs">
                                        ${currentData.images.map((_, idx) => `
                                            <button class="image-tab-btn ${state.activeImageIndex === idx ? 'active' : ''}" onclick="changeImage(${idx})">
                                                ${String.fromCharCode(65 + idx)}
                                            </button>
                                        `).join('')}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }

            contentHTML += `
                    <div class="text-section">
                        <div class="section-header">
                            <div class="icon-box" style="color: ${currentData.neonColor}">
                                ${createSVGIcon(currentData.icon).outerHTML}
                            </div>
                            <span class="section-label" style="color: ${currentData.neonColor}">// 執行協議</span>
                        </div>
                        <h2>${currentData.title}</h2>
                        <p class="description" style="border-color: ${currentData.neonColor}">${currentData.desc}</p>
                        <div class="tasks-box">
                            <h3 class="tasks-header">
                                <span class="tasks-dot" style="background-color: ${currentData.neonColor}"></span>
                                操作任務清單
                            </h3>
                            <ul class="tasks-list">
                                ${currentData.tasks.map(task => `
                                    <li class="task-item">
                                        <svg class="task-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="${currentData.neonColor}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10Z"/><path d="m9 12 2 2 4-4"/>
                                        </svg>
                                        <span class="task-text">${task}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                        ${currentData.tip ? `
                            <div class="tip-box">
                                <div class="tip-header">
                                    <svg class="tip-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/>
                                    </svg>
                                    <span>PRO_TIP / 小秘訣</span>
                                </div>
                                <p class="tip-text">${currentData.tip}</p>
                            </div>
                        ` : ''}
                    </div>
                    </div>
                </div>
                <div class="nav-buttons-container">
                    <button class="prev-btn" ${state.activeStep === 0 ? 'disabled' : ''} onclick="prevStep()">
                        <svg class="chevron-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m15 18-6-6 6-6"/>
                        </svg>
                        上一步
                    </button>
                    <button class="next-btn" ${state.activeStep === kit.steps.length - 1 ? 'disabled' : ''} onclick="nextStep()" style="background-color: ${state.activeStep === kit.steps.length - 1 ? '#333' : currentData.neonColor}; box-shadow: ${state.activeStep === kit.steps.length - 1 ? 'none' : `0 0 25px ${currentData.neonColor}60`}">
                        下一步
                        <svg class="chevron-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m9 18 6-6-6-6"/>
                        </svg>
                    </button>
                </div>
            `;

            container.innerHTML = contentHTML;
            const bgOverlay = document.getElementById('bgOverlay');
            bgOverlay.style.background = currentData.bgImage;
        }

        function renderInfoCards() {
            const kit = KITS[state.activeKit];
            const container = document.getElementById('infoCards');

            container.innerHTML = `
                <div class="info-card storage">
                    <h4>
                        ${createSVGIcon('Package', 'info-card-icon', 20).outerHTML}
                        儲存與保存期限
                    </h4>
                    <p>${kit.storage}</p>
                </div>
                <div class="info-card warnings">
                    <h4>
                        ${createSVGIcon('ShieldAlert', 'info-card-icon', 20).outerHTML}
                        警告與免責聲明
                    </h4>
                    <ul class="warnings-list">
                        ${kit.warnings.map(w => `
                            <li class="warning-item">
                                <svg class="warning-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/>
                                </svg>
                                <span>${w}</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
        }

        function renderFooter() {
            const container = document.getElementById('footer');
            container.innerHTML = `
                <div>純度檢測試劑 操作教學指南 — 僅供研究與減害用途</div>
                <div>Protocol AES-256 Enabled</div>
            `;
        }

        // Event handlers
        function changeKit(kitId) {
            state.activeKit = kitId;
            state.activeStep = 0;
            state.activeImageIndex = 0;
            render();
        }

        function nextStep() {
            const kit = KITS[state.activeKit];
            if (state.activeStep < kit.steps.length - 1) {
                state.activeStep++;
                state.activeImageIndex = 0;
                render();
            }
        }

        function prevStep() {
            if (state.activeStep > 0) {
                state.activeStep--;
                state.activeImageIndex = 0;
                render();
            }
        }

        function goToStep(idx) {
            state.activeStep = idx;
            state.activeImageIndex = 0;
            render();
        }

        function changeImage(idx) {
            state.activeImageIndex = idx;
            renderMain();
        }

        function render() {
            renderNavButtons();
            renderHeader();
            renderMain();
            renderInfoCards();
            renderFooter();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', render);
        render();
    </script>
</body>
</html>
